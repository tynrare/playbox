<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="full-screen" content="yes" />
    <meta
      content="width=device-width, viewport-fit=cover, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
      name="viewport"
    />

    <meta name="screen-orientation" content="landscape" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="360-fullscreen" content="true" />

    <title>playbox</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body #app {
        display: none;
      }

      body.active #app {
        display: flex;
      }
    </style>
    <script>
      document.addEventListener("DOMContentLoaded", (event) => {
        document.body.classList.add("active");

        window.main();
      });
    </script>
    <link rel="stylesheet" href="src/index.less" />
  </head>
  <body>
    <decor id="preload">
      <span id="preload_msg">loading</span>
    </decor>
    <pug src="src/index.pug" />
    <script type="module" src="src/index.js"></script>
  </body>
</html>
